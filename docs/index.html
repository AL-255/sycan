<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sycan REPL — symbolic circuit analysis in your browser</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    max-width: 960px; margin: 2em auto; padding: 0 1em; line-height: 1.45;
  }
  h1 { margin-bottom: 0.2em; }
  .sub { color: #888; margin-top: 0; }
  #status { font-size: 0.9em; color: #888; margin: 0.5em 0; }
  #editor, #output {
    width: 100%; font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px; padding: 10px; box-sizing: border-box;
    border: 1px solid #bbb; border-radius: 6px;
  }
  #editor { height: 320px; resize: vertical; }
  #output { min-height: 160px; background: #f6f6f6; white-space: pre-wrap; }
  @media (prefers-color-scheme: dark) { #output { background: #1a1a1a; } }

  /* Buttons: explicit colors so dark-mode UA styling can't leave text
     invisible on a light background (or vice-versa). */
  button {
    padding: 8px 16px; font-size: 14px; cursor: pointer;
    border: 1px solid #888; border-radius: 6px;
    background: #eaeaea; color: #111;
  }
  button:hover:not(:disabled) { background: #d8d8d8; }
  button:disabled { opacity: 0.5; cursor: wait; }
  button.example {
    padding: 4px 10px; font-size: 13px;
    background: #f3f3f3;
  }
  button.example:hover:not(:disabled) { background: #e3e3e3; }
  @media (prefers-color-scheme: dark) {
    button          { background: #2a2a2a; color: #eee; border-color: #555; }
    button:hover:not(:disabled) { background: #3a3a3a; }
    button.example  { background: #232323; }
    button.example:hover:not(:disabled) { background: #323232; }
  }

  .row { display: flex; gap: 8px; align-items: center; margin: 0.5em 0; flex-wrap: wrap; }
  h3 { margin-bottom: 0.3em; }
</style>
</head>
<body>

<h1>sycan REPL</h1>
<p class="sub">Symbolic circuit analysis (DC · AC · impedance · Monte-Carlo) running
entirely in your browser via Pyodide. <a href="https://github.com/AL-255/sycan">Source on GitHub</a>.</p>

<div id="status">Loading Pyodide…</div>

<h3>Examples</h3>
<div id="examples" class="row"></div>

<h3>Code</h3>
<textarea id="editor" spellcheck="false"></textarea>

<div class="row">
  <button id="run" disabled>Run (Ctrl/⌘-Enter)</button>
  <button id="clear">Clear output</button>
</div>

<h3>Output</h3>
<div id="output"></div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
// -----------------------------------------------------------------------
// Preset examples. Each key is the button label; the value is the code
// loaded into the editor when the button is pressed.
// -----------------------------------------------------------------------
const EXAMPLES = {
  "Voltage divider": `import sympy as sp
from sycan import parse, solve_dc

netlist = """voltage divider
V1 in 0 Vin
R1 in out Ra
R2 out 0 Rb
.end
"""

for sym, expr in solve_dc(parse(netlist)).items():
    print(f"{sym} = {expr}")
`,

  "RC low-pass (AC)": `import sympy as sp
from sycan import parse, solve_ac

netlist = """RC low-pass
V1 in 0 AC Vin
R1 in out R
C1 out 0 C
.end
"""

sol = solve_ac(parse(netlist))
Vin = sp.Symbol("Vin")
H = sol[sp.Symbol("V(out)")] / Vin
print("H(s) =", sp.simplify(H))
`,

  "2-T V_T reference": `import sympy as sp
from sycan import parse
from sycan.components.active import NMOS_subthreshold

# Classical 2-transistor sub-threshold voltage reference:
# sub-threshold currents in two cross-connected NMOS devices with
# different geometry / thresholds pin V(n1) to a CTAT-cancelling
# log-of-ratio voltage.
netlist = """2T reference
V1 vdd 0 VDD
M1 vdd 0 n1 NMOS_subthreshold mu_n1 Cox1 W1 L1 V_TH1 m1 V_T
M2 n1 n1 0 NMOS_subthreshold mu_n2 Cox2 W2 L2 V_TH2 m2 V_T
.end
"""
circuit = parse(netlist)
mosfets = [c for c in circuit.components if isinstance(c, NMOS_subthreshold)]
print(f"Parsed {len(circuit.components)} components, "
      f"including {len(mosfets)} sub-threshold NMOS devices.")

# sp.solve can't close the transcendental KCL directly. But in the
# saturation limit (V_DS >> V_T) matching I_D1 = I_D2 reduces to a
# log-space linear equation, with closed-form solution:
mu_n1, mu_n2, Cox1, Cox2 = sp.symbols(
    "mu_n1 mu_n2 Cox1 Cox2", positive=True)
W1, W2, L1, L2 = sp.symbols("W1 W2 L1 L2", positive=True)
V_TH1, V_TH2, m1, m2, V_T = sp.symbols(
    "V_TH1 V_TH2 m1 m2 V_T", positive=True)

V_n1 = (m1*m2/(m1+m2) * (V_TH2 - V_TH1)
        + m1*m2/(m1+m2) * V_T * sp.log(
            mu_n1*Cox1*W1*L2 / (mu_n2*Cox2*W2*L1)))
print()
print("V(n1) =")
sp.pprint(V_n1)
`,

  "CS amp impedances": `import sympy as sp
from sycan import Circuit, solve_impedance

mu_n, Cox, W, L, V_TH, lam, R_L = sp.symbols("mu_n Cox W L V_TH lam R_L")
VDD, V_GS_op, V_DS_op, C_gs = sp.symbols("VDD V_GS_op V_DS_op C_gs")

c = Circuit()
c.add_port("P_in",  "gate",  "0", "input")
c.add_port("P_out", "drain", "0", "output")
c.add_vsource("Vdd", "vdd", "0", value=VDD, ac_value=0)
c.add_resistor("RL", "vdd", "drain", R_L)
c.add_nmos_l1("M1", "drain", "gate", "0",
              mu_n=mu_n, Cox=Cox, W=W, L=L, V_TH=V_TH, lam=lam,
              C_gs=C_gs, V_GS_op=V_GS_op, V_DS_op=V_DS_op)

print("Z_in  = 1/(s C_gs):")
sp.pprint(sp.simplify(solve_impedance(c, "P_in", termination="auto")))
print()
print("Z_out = R_L || r_o:")
sp.pprint(sp.simplify(solve_impedance(c, "P_out", termination="auto")))
`,

  "SRPP optimal load": `import sympy as sp
from sycan import Circuit, solve_impedance

# SRPP (Series-Regulated Push-Pull): two identical triodes stacked with
# a sense resistor Rs between T2's cathode and T1's plate.
K, mu, V_g_op, V_p_op, R_s, V_B = sp.symbols("K mu V_g_op V_p_op R_s V_B")

c = Circuit()
c.add_port("P_in",  "in",  "0", "input")
c.add_port("P_out", "out", "0", "output")
c.add_vsource("Vb", "hv", "0", value=V_B, ac_value=0)
c.add_triode("T1", plate="n_mid", grid="in",    cathode="0",
             K=K, mu=mu, V_g_op=V_g_op, V_p_op=V_p_op)
c.add_triode("T2", plate="hv",    grid="n_mid", cathode="out",
             K=K, mu=mu, V_g_op=V_g_op, V_p_op=V_p_op)
c.add_resistor("Rs", "out", "n_mid", R_s)

Z_out = solve_impedance(c, "P_out", termination="auto")
print("Z_out(R_s) =")
sp.pprint(sp.simplify(Z_out))
print()
print("R_s -> infinity limit (== R_L optimal for 2nd-harmonic cancellation):")
sp.pprint(sp.limit(Z_out, R_s, sp.oo))
`,

  "Wheatstone bridge": `import sympy as sp
from sycan import parse, solve_dc

netlist = """wheatstone bridge
V1 a 0 Vs
R1 a b R1
R2 b 0 R2
R3 a c R3
R4 c 0 R4
.end
"""

sol = solve_dc(parse(netlist))
V_b = sol[sp.Symbol("V(b)")]
V_c = sol[sp.Symbol("V(c)")]
diff = sp.simplify(V_b - V_c)
print("V(b) - V(c) =")
sp.pprint(diff)
print()
print("Balance condition: R1*R4 == R2*R3")
`,
};

// -----------------------------------------------------------------------
// Page wiring
// -----------------------------------------------------------------------
let py = null;
const status     = document.getElementById('status');
const editor     = document.getElementById('editor');
const output     = document.getElementById('output');
const runBtn     = document.getElementById('run');
const clearBtn   = document.getElementById('clear');
const examplesEl = document.getElementById('examples');

function write(msg) { output.textContent += msg; }

function loadExample(name) {
  editor.value = EXAMPLES[name];
  output.textContent = '';
}

// Build the example buttons.
for (const name of Object.keys(EXAMPLES)) {
  const b = document.createElement('button');
  b.className = 'example';
  b.textContent = name;
  b.addEventListener('click', () => loadExample(name));
  examplesEl.appendChild(b);
}
// Start with the first example loaded.
loadExample(Object.keys(EXAMPLES)[0]);

async function boot() {
  py = await loadPyodide();
  status.textContent = 'Installing sympy + sycan…';
  await py.loadPackage(['sympy', 'micropip']);
  await py.runPythonAsync(`
import micropip
await micropip.install('./sycan-0.1.1-py3-none-any.whl?v=1')
import sycan
print(f'sycan {sycan.__name__} ready')
  `);
  status.textContent = 'Ready. Pick an example above (or edit) and hit Run.';
  runBtn.disabled = false;
  editor.focus();
}

async function run() {
  output.textContent = '';
  py.setStdout({ batched: (s) => write(s + '\n') });
  py.setStderr({ batched: (s) => write(s + '\n') });
  runBtn.disabled = true;
  try {
    const result = await py.runPythonAsync(editor.value);
    if (result !== undefined && result !== null) write(String(result) + '\n');
  } catch (e) {
    write(String(e));
  } finally {
    runBtn.disabled = false;
  }
}

runBtn.addEventListener('click', run);
clearBtn.addEventListener('click', () => { output.textContent = ''; });
editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); run(); }
});

boot().catch((e) => { status.textContent = 'Failed to load Pyodide: ' + e; });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sycan REPL — symbolic circuit analysis in your browser</title>

<!-- CodeMirror: syntax-highlighted editor with line numbers. -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/monokai.css">

<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    max-width: 960px; margin: 2em auto; padding: 0 1em; line-height: 1.45;
  }
  h1 { margin-bottom: 0.2em; }
  .sub { color: #888; margin-top: 0; }
  #status { font-size: 0.9em; color: #888; margin: 0.5em 0; }
  #output {
    width: 100%; font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px; padding: 10px; box-sizing: border-box;
    border: 1px solid #bbb; border-radius: 6px;
    min-height: 160px; background: #f6f6f6; white-space: pre-wrap;
  }
  #schematic {
    width: 100%; box-sizing: border-box; min-height: 220px;
    border: 1px solid #bbb; border-radius: 6px; padding: 12px;
    background: #fff; overflow: auto;
  }
  #schematic.empty {
    display: flex; align-items: center; justify-content: center;
    color: #666; font-style: italic;
  }
  #schematic svg { display: block; width: 100%; height: auto; }
  @media (prefers-color-scheme: dark) { #output { background: #1a1a1a; } }
  @media (prefers-color-scheme: dark) { #schematic.empty { color: #aaa; } }

  /* CodeMirror frame matches the other UI elements. */
  .CodeMirror {
    height: 320px;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    border: 1px solid #bbb; border-radius: 6px;
  }

  /* Buttons: explicit colors so dark-mode UA styling can't leave text
     invisible on a light background (or vice-versa). */
  button {
    padding: 8px 16px; font-size: 14px; cursor: pointer;
    border: 1px solid #888; border-radius: 6px;
    background: #eaeaea; color: #111;
  }
  button:hover:not(:disabled) { background: #d8d8d8; }
  button:disabled { opacity: 0.5; cursor: wait; }
  button.example {
    padding: 4px 10px; font-size: 13px;
    background: #f3f3f3;
  }
  button.example:hover:not(:disabled) { background: #e3e3e3; }
  @media (prefers-color-scheme: dark) {
    button          { background: #2a2a2a; color: #eee; border-color: #555; }
    button:hover:not(:disabled) { background: #3a3a3a; }
    button.example  { background: #232323; }
    button.example:hover:not(:disabled) { background: #323232; }
  }

  .row { display: flex; gap: 8px; align-items: center; margin: 0.5em 0; flex-wrap: wrap; }
  h3 { margin-bottom: 0.3em; }
</style>
</head>
<body>

<h1>SYCAN REPL Demo</h1>
<p class="sub">Symbolic circuit analysis (DC · AC · impedance · Monte-Carlo) running
entirely in your browser via Pyodide, with inline schematic rendering via
<code>autodraw</code>. <a href="https://github.com/AL-255/sycan">Source on GitHub</a>.</p>

<div id="status">Loading Pyodide…</div>

<h3>Examples</h3>
<div id="examples" class="row"></div>

<div id="filter-controls" class="row" style="display:none">
  <strong>Filter:</strong>
  <label>family
    <select id="filter-family">
      <option value="butterworth">Butterworth</option>
      <option value="chebyshev">Chebyshev I</option>
      <option value="bessel">Bessel</option>
    </select>
  </label>
  <label>order
    <input id="filter-order" type="number" min="1" max="8" value="4" style="width:60px">
  </label>
  <label>ripple [dB]
    <input id="filter-ripple" type="number" min="0.1" max="10" step="0.1" value="1.0" style="width:80px">
  </label>
</div>

<h3>Code</h3>
<textarea id="editor" spellcheck="false"></textarea>

<div class="row">
  <button id="run" disabled>Run (Ctrl/⌘-Enter)</button>
  <button id="clear">Clear output</button>
</div>

<h3>Output</h3>
<div id="output"></div>

<h3 id="schematic-heading">Schematic</h3>
<div id="schematic"></div>

<script>
  // MathJax v3: render any $$...$$ / \[...\] block (and $...$ / \(...\)
  // for inline) the examples emit. We trigger typesetting manually after
  // each run so the output div picks up newly-printed LaTeX.
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
    },
    svg: { fontCache: 'global' },
    startup: { typeset: false },
  };
</script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>

<script>
// -----------------------------------------------------------------------
// Page wiring. Examples live in `examples/` as plain .py files listed in
// `examples/manifest.json`; this script just fetches and displays them.
// -----------------------------------------------------------------------
let py = null, cm = null;
const status     = document.getElementById('status');
const editorEl   = document.getElementById('editor');
const output     = document.getElementById('output');
const schematic  = document.getElementById('schematic');
const runBtn     = document.getElementById('run');
const clearBtn   = document.getElementById('clear');
const examplesEl = document.getElementById('examples');

function write(msg) { output.textContent += msg; }

function resetSchematic(message = 'Run an example that returns SVG to render it here.') {
  schematic.replaceChildren();
  schematic.textContent = message;
  schematic.classList.add('empty');
}

function isSvgDocument(text) {
  if (typeof text !== 'string') return false;
  const trimmed = text.trim();
  return trimmed.startsWith('<svg') && trimmed.endsWith('</svg>');
}

function renderSvg(svgText) {
  const parsed = new DOMParser().parseFromString(svgText, 'image/svg+xml');
  if (parsed.querySelector('parsererror')) {
    throw new Error('Could not parse SVG returned by Python.');
  }
  const svg = parsed.documentElement;
  if (!svg || svg.tagName.toLowerCase() !== 'svg') {
    throw new Error('Python returned markup, but it was not an <svg> document.');
  }
  const rendered = document.importNode(svg, true);
  rendered.removeAttribute('width');
  rendered.removeAttribute('height');
  schematic.replaceChildren(rendered);
  schematic.classList.remove('empty');
}

async function loadExample(file) {
  const resp = await fetch(`./examples/${file}`);
  if (!resp.ok) throw new Error(`Could not fetch ${file}: ${resp.status}`);
  const code = await resp.text();
  cm.setValue(code);
  output.textContent = '';
  resetSchematic();
  // Show the filter-parameter UI only for the LPF example.
  const isLPF = (file === 'lowpass_filter.py');
  document.getElementById('filter-controls').style.display = isLPF ? 'flex' : 'none';
  document.getElementById('schematic-heading').textContent = isLPF ? 'Bode plot' : 'Schematic';
}

async function buildExamples() {
  const resp = await fetch('./examples/manifest.json');
  if (!resp.ok) throw new Error(`Could not fetch manifest: ${resp.status}`);
  const manifest = await resp.json();
  for (const {label, file} of manifest) {
    const b = document.createElement('button');
    b.className = 'example';
    b.textContent = label;
    b.addEventListener('click', () => {
      loadExample(file).catch((e) => write(String(e) + '\n'));
    });
    examplesEl.appendChild(b);
  }
  if (manifest.length > 0) {
    await loadExample(manifest[0].file);
  }
}

// Glyph SVGs that ship in res/. Must stay in sync with KIND_GLYPHS in
// sycan/svg_util.py — extra entries here are silently ignored, but a
// missing entry means that component kind falls back to the labelled
// rect on the page even though the wheel knows about it.
const GLYPH_KINDS = [
  'nmos', 'pmos', 'npn', 'pnp', 'triode', 'diode',
  'vsrc', 'isrc', 'res', 'ind', 'cap', 'ccsrc', 'gnd',
];
const GLYPH_DIR = '/sycan_res';

async function fetchGlyphs() {
  const entries = await Promise.all(GLYPH_KINDS.map(async (kind) => {
    const r = await fetch(`./res/${kind}.svg`);
    if (!r.ok) {
      // Don't fail the whole boot — just skip kinds the deployment is
      // missing. autodraw renders those as labelled rects.
      console.warn(`glyph ${kind}.svg missing: ${r.status}`);
      return null;
    }
    return [kind, await r.text()];
  }));
  return entries.filter((e) => e !== null);
}

function installGlyphs(entries) {
  // Materialize the glyphs inside Pyodide's virtual FS at GLYPH_DIR
  // and point sycan.autodraw at it. autodraw's default is computed
  // from __file__ at module import time, which lands on a path that
  // doesn't exist in Pyodide; we override the module attribute so
  // examples can call autodraw(...) without a res_dir kwarg.
  py.FS.mkdirTree(GLYPH_DIR);
  const enc = new TextEncoder();
  for (const [kind, text] of entries) {
    py.FS.writeFile(`${GLYPH_DIR}/${kind}.svg`, enc.encode(text));
  }
  // Python evaluates default arguments at def time, so updating the
  // module-level _DEFAULT_RES_DIR doesn't change the already-bound
  // default on autodraw(). Patch the keyword default in-place too so
  // examples can omit the res_dir kwarg. Note: ``sycan/__init__.py``
  // rebinds ``sycan.autodraw`` to the function, shadowing the
  // submodule, so we have to fetch the module from ``sys.modules``
  // rather than via ``import sycan.autodraw``.
  py.runPython(`
import sys
from pathlib import Path
_ad = sys.modules['sycan.autodraw']
_p = Path(${JSON.stringify(GLYPH_DIR)})
_ad._DEFAULT_RES_DIR = _p
_ad.autodraw.__kwdefaults__['res_dir'] = _p
`);
}

function initEditor() {
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  cm = CodeMirror.fromTextArea(editorEl, {
    mode: 'python',
    lineNumbers: true,
    indentUnit: 4,
    theme: dark ? 'monokai' : 'default',
    extraKeys: {
      'Ctrl-Enter': run,
      'Cmd-Enter':  run,
    },
  });
  // Live-follow OS theme changes.
  window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', (e) => {
          cm.setOption('theme', e.matches ? 'monokai' : 'default');
        });
}

async function boot() {
  initEditor();
  resetSchematic();
  // Examples, glyphs, and Pyodide all load in parallel; we only need
  // everything done before enabling Run. Glyphs are fetched as static
  // files from the Pages deployment and written into Pyodide's FS once
  // it's up — see installGlyphs.
  const examplesP = buildExamples().catch((e) => {
    status.textContent = 'Failed to load examples: ' + e;
    throw e;
  });
  const glyphsP = fetchGlyphs().catch((e) => {
    console.warn('Failed to fetch glyphs, falling back to rects:', e);
    return [];
  });
  py = await loadPyodide();
  status.textContent = 'Installing sympy + sycan…';
await py.loadPackage(['sympy', 'numpy', 'micropip']);
  await py.runPythonAsync(`
import micropip
await micropip.install('./sycan-0.1.3-py3-none-any.whl')
import sycan
print(f'sycan {sycan.__name__} ready')
  `);
  const glyphs = await glyphsP;
  if (glyphs.length > 0) installGlyphs(glyphs);
  await examplesP;
  status.textContent = 'Ready. Pick an example above (or edit) and hit Run.';
  runBtn.disabled = false;
  cm.focus();
}

async function typesetMath() {
  if (!window.MathJax || !MathJax.typesetPromise) return;
  if (MathJax.startup && MathJax.startup.promise) {
    await MathJax.startup.promise;
  }
  await MathJax.typesetPromise([output]);
}

async function run() {
  if (runBtn.disabled || !py) return;
  output.textContent = '';
  resetSchematic();
  py.setStdout({ batched: (s) => write(s + '\n') });
  py.setStderr({ batched: (s) => write(s + '\n') });
  runBtn.disabled = true;
  try {
    const result = await py.runPythonAsync(cm.getValue());
    if (isSvgDocument(result)) {
      renderSvg(result);
    } else if (result !== undefined && result !== null) {
      write(String(result) + '\n');
    }
  } catch (e) {
    write(String(e));
  } finally {
    runBtn.disabled = false;
    try { await typesetMath(); } catch (_) { /* MathJax errors are non-fatal */ }
  }
}

runBtn.addEventListener('click', run);
clearBtn.addEventListener('click', () => {
  output.textContent = '';
  resetSchematic();
});

// Re-run when the filter controls change (debounced, only when the
// panel is visible — i.e., the LPF example is loaded).
{
  const panel = document.getElementById('filter-controls');
  let pending = null;
  const trigger = () => {
    if (panel.style.display === 'none' || runBtn.disabled) return;
    clearTimeout(pending);
    pending = setTimeout(() => { run().catch(() => {}); }, 120);
  };
  ['filter-family', 'filter-order', 'filter-ripple'].forEach((id) => {
    document.getElementById(id).addEventListener('input', trigger);
    document.getElementById(id).addEventListener('change', trigger);
  });
}

boot().catch((e) => { status.textContent = 'Failed to load Pyodide: ' + e; });
</script>
</body>
</html>

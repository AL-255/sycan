<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="-30 0 36.699997 36"
   version="1.1"
   id="svg4"
   width="36.699997"
   height="36"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs4">
    <marker
       style="overflow:visible"
       id="Triangle"
       refX="0"
       refY="0"
       orient="auto-start-reverse"
       markerWidth="1"
       markerHeight="1"
       viewBox="0 0 1 1"
       preserveAspectRatio="xMidYMid">
      <path
         transform="scale(0.5)"
         style="fill:context-stroke;fill-rule:evenodd;stroke:context-stroke;stroke-width:1pt"
         d="M 5.77,0 -2.88,5 V -5 Z"
         id="path135" />
    </marker>
  </defs>
  <rect
     style="display:none;fill:#ff00ff;stroke:none;stroke-width:1.5;stroke-linecap:square;stroke-linejoin:miter;stroke-miterlimit:4.1"
     id="rect1"
     width="40"
     height="40"
     x="-32"
     y="-2" />
  <!-- channel: continuous vertical line (JFET has a resistive channel, not a broken line like MOSFET) -->
  <line
     x1="-12"
     y1="0"
     x2="-12"
     y2="36"
     stroke="#000000"
     stroke-width="1.5"
     id="channel"
     style="stroke:#000000;stroke-width:1.5;stroke-dasharray:none" />
  <!-- gate: line from left, arrow points toward the channel (N-JFET: P-gate → N-channel) -->
  <path
     style="fill:none;stroke:#000000;stroke-width:1.5;stroke-miterlimit:4.1;stroke-dasharray:none;marker-end:url(#Triangle)"
     d="M -30,18 H -12"
     id="gate" />
  <!-- drain lead -->
  <path
     style="fill:none;stroke:#000000;stroke-width:1.5;stroke-miterlimit:4.1;stroke-dasharray:none"
     d="M -2,0 H -12"
     id="drain-lead" />
  <!-- source lead -->
  <path
     style="fill:none;stroke:#000000;stroke-width:1.5;stroke-miterlimit:4.1;stroke-dasharray:none"
     d="M -2,36 H -12"
     id="source-lead" />
  <!-- port markers -->
  <circle
     id="port-drain"
     cx="-2"
     cy="-2"
     fill="none"
     stroke="none"
     r="0" />
  <circle
     id="port-gate"
     cx="-32"
     cy="18"
     fill="none"
     stroke="none"
     r="0" />
  <circle
     id="port-source"
     cx="-2"
     cy="38"
     fill="none"
     stroke="none"
     r="0" />
</svg>

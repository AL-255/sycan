<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sycan circuit editor — schematic capture in your browser</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Michroma&display=swap">

<style>
  :root {
    color-scheme: light dark;
    --fg: #111;
    --bg: #fff;
    --muted: #888;
    --line: #bbb;
    --panel: #f6f6f6;
    --hover: #d8d8d8;
    --btn-bg: #eaeaea;
    --btn-fg: #111;
    --grid: #d5d5d5;
    --stroke: #111;
    --select: #1976d2;
    --preview: #1976d2;
    --terminal: #444;
    --node: #666;
    /* Cursor crosshair colour. Dark navy on light backgrounds for
       contrast; the dark-theme override below swaps in amber. */
    --cross: #003266;
    /* Net-highlight overlay colour. Persimmon orange — distinct from
       both the select blue and the crosshair amber/navy. */
    --highlight: #ff7e29;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #eee;
      --bg: #181818;
      --muted: #aaa;
      --line: #555;
      --panel: #1a1a1a;
      --hover: #3a3a3a;
      --btn-bg: #2a2a2a;
      --btn-fg: #eee;
      --grid: #2c2c2c;
      --stroke: #e7e7e7;
      --select: #6cb4ff;
      --preview: #6cb4ff;
      --terminal: #aaa;
      --node: #888;
      --cross: #ffb405;
      --highlight: #ffa45a;
    }
  }

  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.45;
  }
  body {
    display: flex; flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 18px 4px;
    border-bottom: 1px solid var(--line);
  }
  .header-row { display: flex; align-items: center; gap: 16px; }
  .header-row img { height: 48px; width: auto; flex: none; }
  h1 {
    margin: 0;
    font-family: "Michroma", system-ui, sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
  }
  .sub {
    margin: 2px 0 0; color: var(--muted); font-size: 0.85rem;
  }
  .sub a { color: inherit; }

  /* Toolbar */
  #toolbar {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .group {
    display: flex; gap: 2px; padding: 0 6px;
    border-right: 1px solid var(--line);
  }
  .group:last-child { border-right: none; }
  .tool {
    background: var(--btn-bg); color: var(--btn-fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 8px; cursor: pointer;
    font-size: 12px; min-width: 38px;
    display: inline-flex; align-items: center; gap: 4px;
    user-select: none;
  }
  .tool:hover { background: var(--hover); }
  .tool.active {
    background: var(--select); color: white; border-color: var(--select);
  }
  .tool svg { display: block; }
  .tool .label { font-weight: 500; }

  /* Components dropdown */
  .picker {
    background: var(--btn-bg); color: var(--btn-fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 6px; font-size: 12px;
    font-family: inherit;
    min-width: 170px; cursor: pointer;
  }
  .picker:focus { outline: 1px solid var(--select); }

  /* Main work area */
  main {
    flex: 1; display: flex; min-height: 0;
  }
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: var(--bg);
    cursor: crosshair;
    touch-action: none;
  }
  #canvas-wrap.tool-select { cursor: default; }
  #canvas-wrap.tool-delete { cursor: not-allowed; }
  #canvas-wrap.tool-rotate { cursor: alias; }
  #canvas-wrap.tool-highlight { cursor: crosshair; }
  #canvas-wrap.panning { cursor: grabbing; }
  #canvas-wrap.moving  { cursor: move; }
  #canvas-wrap.picking-anchor { cursor: crosshair; }
  #canvas-wrap.picking-node   { cursor: help; }
  #canvas {
    width: 100%; height: 100%;
    display: block;
  }

  /* Side panel */
  #side {
    width: 320px; flex: none; border-left: 1px solid var(--line);
    background: var(--panel);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #side h3 {
    margin: 0; padding: 8px 12px;
    font-size: 0.78rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
  }
  .pane { padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .pane label {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85rem; margin-bottom: 6px;
  }
  .pane label span:first-child {
    width: 60px; color: var(--muted); flex: none;
  }
  .pane input[type=text] {
    flex: 1; min-width: 0;
    padding: 4px 6px; font-size: 0.85rem;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
  }
  .pane .empty-msg { color: var(--muted); font-style: italic; font-size: 0.85rem; }

  #netlist-pane {
    flex: 1; display: flex; flex-direction: column; min-height: 0;
  }
  #netlist {
    flex: 1; padding: 8px 12px; margin: 0;
    background: var(--bg);
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 12px; white-space: pre;
    overflow: auto; min-height: 0;
    border: none;
    color: var(--fg);
    outline: none; resize: none;
  }
  .netlist-actions {
    display: flex; gap: 6px; padding: 6px 8px;
    border-top: 1px solid var(--line);
    background: var(--panel);
  }
  .netlist-actions button {
    flex: 1;
    background: var(--btn-bg); color: var(--btn-fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 5px 8px; cursor: pointer; font-size: 12px;
  }
  .netlist-actions button:hover { background: var(--hover); }

  /* Node-expression pane */
  #calc-pane {
    flex: none;
    max-height: 220px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .calc-controls {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 6px; flex: none;
  }
  .calc-controls button {
    background: var(--btn-bg); color: var(--btn-fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 10px; cursor: pointer; font-size: 12px;
    flex: none;
  }
  .calc-controls button:hover { background: var(--hover); }
  .calc-controls button.armed {
    background: var(--select); color: white; border-color: var(--select);
  }
  .calc-status {
    color: var(--muted); font-size: 0.78rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .calc-output {
    flex: 1; min-height: 0; overflow: auto;
    padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--line); border-radius: 4px;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 12px;
  }
  .calc-output .calc-node-name {
    color: var(--select); font-weight: 600;
  }
  .calc-output .calc-expr {
    margin-top: 4px; white-space: pre-wrap; word-break: break-word;
  }
  .calc-output .calc-mathjax {
    margin-top: 6px; font-family: serif; font-size: 13px;
  }
  .calc-output .calc-err {
    color: #d33; white-space: pre-wrap;
  }

  /* Status / hint bar */
  #hint {
    padding: 4px 12px; font-size: 0.78rem; color: var(--muted);
    border-top: 1px solid var(--line); background: var(--panel);
    min-height: 1.2em;
  }
  #hint kbd {
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 0.85em; background: var(--bg);
    padding: 1px 4px; border: 1px solid var(--line);
    border-radius: 3px; color: var(--fg);
  }

  /* Canvas SVG element styling */
  .grid-dot { fill: var(--grid); }
  /* Glyphs imported from res/ inherit `color` from the parent group;
     their stroke attributes are rewritten to `currentColor` at load
     time, so this one variable drives every glyph's outline. */
  .glyph         { color: var(--stroke); }
  .glyph-preview { color: var(--preview); opacity: 0.85; }
  .glyph-preview * { stroke-dasharray: 4 3; }
  .part-body {
    fill: none; stroke: var(--stroke); stroke-width: 1.6;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .part-fill { fill: var(--bg); stroke: var(--stroke); stroke-width: 1.6; }
  .part-text {
    fill: var(--stroke); font-size: 11px;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    pointer-events: none; user-select: none;
  }
  .part-name {
    fill: var(--stroke); font-size: 11px; font-weight: 600;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    pointer-events: none; user-select: none;
  }
  .wire {
    fill: none; stroke: var(--stroke); stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .wire-selected {
    stroke: var(--select); stroke-width: 2.4;
  }
  .move-ghost {
    opacity: 0.6;
  }
  .terminal { fill: var(--terminal); stroke: none; }
  .node-dot { fill: var(--stroke); stroke: none; }
  .net-label-text {
    fill: var(--stroke); font-size: 11px; font-weight: 600;
    font-family: "JetBrains Mono", Menlo, Consolas, monospace;
    pointer-events: none; user-select: none;
  }
  .net-label-bg {
    fill: var(--bg); stroke: var(--stroke); stroke-width: 1;
    rx: 3; ry: 3; pointer-events: none;
  }
  .calc-node-highlight {
    fill: none; stroke: var(--select); stroke-width: 3;
    stroke-dasharray: 6 4; opacity: 0.7;
    pointer-events: none;
  }
  /* Net-highlight overlay (Net Highlight tool). Wider, solid stroke at
     reduced opacity so it reads as a wash *under* the wire stroke
     rather than competing with it. */
  .net-highlight {
    fill: none; stroke: var(--highlight); stroke-width: 6;
    stroke-linecap: round; stroke-linejoin: round;
    opacity: 0.42; pointer-events: none;
  }
  .net-highlight-term {
    fill: var(--highlight); stroke: none;
    opacity: 0.42; pointer-events: none;
  }
  .preview {
    fill: none; stroke: var(--preview); stroke-width: 1.6;
    stroke-dasharray: 4 3; opacity: 0.85;
  }
  .preview-fill { fill: var(--bg); stroke: var(--preview); stroke-width: 1.6; stroke-dasharray: 4 3; opacity: 0.85; }
  .selection-box {
    fill: none; stroke: var(--select); stroke-width: 1.4;
    stroke-dasharray: 3 3;
  }
  .hover-box {
    fill: none; stroke: var(--select); stroke-width: 1;
    stroke-dasharray: 2 3; opacity: 0.5;
  }
  .hit { fill: transparent; pointer-events: stroke; stroke: transparent; stroke-width: 14; }
  .hit-rect { fill: transparent; pointer-events: all; }

  /* Responsive */
  @media (max-width: 800px) {
    main { flex-direction: column; }
    #side { width: auto; height: 280px; border-left: none; border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <img src="../repl/res/sycan_s.png" alt="SYCAN logo"
         onerror="this.style.display='none'">
    <div>
      <h1>SYCAN Circuit Editor</h1>
      <p class="sub">
        Schematic capture for symbolic circuit analysis &mdash;
        <a href="../">docs home</a> &middot;
        <a href="../repl/">REPL</a> &middot;
        <a href="https://github.com/AL-255/sycan">source</a>
      </p>
    </div>
  </div>
</header>

<div id="toolbar">
  <div class="group" data-group="picker">
    <select id="part-picker" class="picker" title="All components">
      <option value="" disabled selected>— components —</option>
      <optgroup label="Passive">
        <option value="res">Resistor (R)</option>
        <option value="ind">Inductor (L)</option>
        <option value="cap">Capacitor (C)</option>
      </optgroup>
      <optgroup label="Sources">
        <option value="vsrc">Voltage source (V)</option>
        <option value="isrc">Current source (I)</option>
      </optgroup>
      <optgroup label="Active">
        <option value="diode">Diode (D)</option>
        <option value="npn">BJT — NPN (Q)</option>
        <option value="pnp">BJT — PNP (Q)</option>
        <option value="nmos">MOSFET — NMOS (M)</option>
        <option value="pmos">MOSFET — PMOS (M)</option>
        <option value="nmos_4t">MOSFET — NMOS 4-T</option>
        <option value="pmos_4t">MOSFET — PMOS 4-T</option>
        <option value="triode">Triode</option>
      </optgroup>
      <optgroup label="Controlled sources">
        <option value="vcvs">VCVS (E) — voltage-controlled V</option>
        <option value="vccs">VCCS (G) — voltage-controlled I</option>
        <option value="cccs">CCCS (F) — current-controlled I</option>
        <option value="ccvs">CCVS (H) — current-controlled V</option>
      </optgroup>
      <optgroup label="Connect">
        <option value="gnd">Ground (GND)</option>
        <option value="WIRE">Wire (W)</option>
      </optgroup>
    </select>
  </div>
  <div class="group" data-group="parts">
    <button class="tool" data-tool="res" title="Resistor (R)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-12 L-10,-5 L-6,5 L-2,-5 L2,5 L6,-5 L10,5 L12,0 H22"
              fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">R</span>
    </button>
    <button class="tool" data-tool="ind" title="Inductor (L)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-12 a3,3 0 0 1 6,0 a3,3 0 0 1 6,0 a3,3 0 0 1 6,0 a3,3 0 0 1 6,0 H22"
              fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">L</span>
    </button>
    <button class="tool" data-tool="cap" title="Capacitor (C)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-3 M-3,-6 V6 M3,-6 V6 M3,0 H22"
              fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">C</span>
    </button>
  </div>
  <div class="group" data-group="sources">
    <button class="tool" data-tool="vsrc" title="Voltage source (V)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-7 M7,0 H22" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <text x="-3" y="-1" font-size="6" fill="currentColor">+</text>
        <text x="-3" y="5" font-size="7" fill="currentColor">−</text>
      </svg>
      <span class="label">V</span>
    </button>
    <button class="tool" data-tool="isrc" title="Current source (I)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-7 M7,0 H22" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M-3.5,0 H3 M0.5,-2 L3.5,0 L0.5,2" fill="none" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      <span class="label">I</span>
    </button>
  </div>
  <div class="group" data-group="active">
    <button class="tool" data-tool="diode" title="Diode (D)">
      <svg width="22" height="14" viewBox="-22 -7 44 14" aria-hidden="true">
        <path d="M-22,0 H-4 M-4,-5 V5 L4,0 Z M4,-5 V5 M4,0 H22"
              fill="none" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      <span class="label">D</span>
    </button>
    <button class="tool" data-tool="npn" title="BJT — NPN (Q)">
      <svg width="20" height="20" viewBox="-2 -10 20 20" aria-hidden="true">
        <circle cx="9" cy="0" r="8" fill="none" stroke="currentColor" stroke-width="1"/>
        <path d="M3,-4 V4 M3,-2 L11,-7 M3,2 L11,7 M9,5 L11,7 L8,7" fill="none" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span class="label">Q</span>
    </button>
    <button class="tool" data-tool="nmos" title="MOSFET — NMOS (M)">
      <svg width="20" height="20" viewBox="-2 -10 20 20" aria-hidden="true">
        <path d="M2,-6 V6 M5,-5 V-2 H12 M5,2 V5 H12 M5,-1 V1" fill="none" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span class="label">M</span>
    </button>
  </div>
  <div class="group" data-group="connect-parts">
    <button class="tool" data-tool="gnd" title="Ground (G)">
      <svg width="14" height="16" viewBox="-7 -2 14 16" aria-hidden="true">
        <path d="M0,-2 V4 M-6,4 H6 M-4,7 H4 M-2,10 H2"
              fill="none" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">GND</span>
    </button>
  </div>
  <div class="group" data-group="connect">
    <button class="tool" data-tool="WIRE" title="Wire (W)">
      <svg width="22" height="14" viewBox="-11 -7 22 14" aria-hidden="true">
        <path d="M-10,4 L-2,4 L-2,-4 L10,-4" fill="none"
              stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="label">Wire</span>
    </button>
  </div>
  <div class="group" data-group="edit">
    <button class="tool" data-tool="select" title="Select (S / Esc)">
      <svg width="14" height="14" viewBox="-1 -1 14 14" aria-hidden="true">
        <path d="M0,0 L0,11 L3,8 L6,12 L8,11 L5,7 L9,7 Z"
              fill="currentColor" stroke="currentColor" stroke-width="0.5"/>
      </svg>
      <span class="label">Select</span>
    </button>
    <button class="tool" data-tool="delete" title="Delete tool (D)">
      <svg width="14" height="14" viewBox="-7 -7 14 14" aria-hidden="true">
        <path d="M-4,-4 L4,4 M-4,4 L4,-4" fill="none"
              stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span class="label">Delete</span>
    </button>
    <button class="tool" data-tool="rotate" title="Rotate tool (T)">
      <svg width="14" height="14" viewBox="-7 -7 14 14" aria-hidden="true">
        <path d="M5,-1 A5,5 0 1 0 4,4" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
        <path d="M5,-3 L5,-1 L3,-1" fill="none"
              stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">Rotate</span>
    </button>
    <button class="tool" data-tool="highlight"
            title="Net Highlight: click a wire to highlight its net (and any wires sharing the same name)">
      <svg width="22" height="14" viewBox="-11 -7 22 14" aria-hidden="true">
        <!-- A wire under an orange wash, mirroring the canvas overlay. -->
        <path d="M-10,3 L-3,3 L-3,-3 L10,-3" fill="none"
              stroke="#ff7e29" stroke-width="4" opacity="0.45"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M-10,3 L-3,3 L-3,-3 L10,-3" fill="none"
              stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="label">Highlight</span>
    </button>
  </div>
  <div class="group" data-group="file">
    <button class="tool" id="btn-undo" title="Undo (Ctrl+Z)"><span class="label">Undo</span></button>
    <button class="tool" id="btn-redo" title="Redo (Ctrl+Shift+Z)"><span class="label">Redo</span></button>
    <button class="tool" id="btn-clear" title="Clear all"><span class="label">Clear</span></button>
    <button class="tool" id="btn-fit" title="Fit / center view"><span class="label">Fit</span></button>
  </div>
</div>

<main>
  <div id="canvas-wrap" class="tool-R">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <aside id="side">
    <h3>Properties</h3>
    <div class="pane" id="prop-pane">
      <div class="empty-msg">Click an element to inspect.</div>
    </div>

    <h3>Node expression</h3>
    <div id="calc-pane" class="pane">
      <div class="calc-controls">
        <button id="btn-calc-node" title="Symbolically solve a node voltage with sycan">Calc Node</button>
        <select id="calc-mode" class="picker" title="Analysis mode" style="min-width: 70px; flex: none;">
          <option value="auto" selected>Auto</option>
          <option value="dc">DC</option>
          <option value="ac">AC</option>
        </select>
        <span id="calc-status" class="calc-status"></span>
      </div>
      <div id="calc-output" class="calc-output">
        <div class="empty-msg">Click <em>Calc Node</em>, then click a wire or terminal to compute its symbolic voltage.</div>
      </div>
    </div>

    <h3>Netlist</h3>
    <div id="netlist-pane">
      <textarea id="netlist" readonly spellcheck="false" wrap="off"></textarea>
      <div class="netlist-actions">
        <button id="btn-copy">Copy</button>
        <button id="btn-export-json">Export JSON</button>
        <button id="btn-import-json">Import JSON</button>
      </div>
    </div>
  </aside>
</main>

<div id="hint"></div>

<input type="file" id="file-input" accept=".json,application/json" style="display:none">

<!-- MathJax (loaded async; the editor checks for window.MathJax before
     using it and falls back to plain text if it never resolves). -->
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
  svg: { fontCache: 'global' },
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

<!-- Pyodide (loaded async; the Calc Node button kicks off
     `loadPyodide()` lazily on first use — see editor.js). -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js" async></script>

<!-- Two-file split: glyphs.js owns the component library + glyph
     drawing; editor.js owns state/UI/persistence. `defer` keeps
     them in document order so glyphs.js runs first. -->
<script src="glyphs.js" defer></script>
<script src="editor.js" defer></script>
</body>
</html>

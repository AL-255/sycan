[project]
name = "sycan"
version = "0.1.0"
description = "SYmbolic Circuit ANalysis"
readme = "README.md"
authors = [
    { name = "AL-255", email = "thelithcore@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "sympy>=1.14.0",
]

[project.scripts]
sycan = "sycan:main"

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "lcapy>=1.26",
    "pytest>=9.0.3",
]
